services:
  - type: web
    name: farm-sales-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://ep-crimson-tooth-abykm6ln-pooler.eu-west-2.aws.neon.tech/neondb?sslmode=require"
      - key: SPRING_DATASOURCE_USERNAME
        value: "neondb_owner"
      - key: SPRING_DATASOURCE_PASSWORD
        value: "npg_lk5sbDdMOt8X"
      - key: JWT_SECRET
        generateValue: true
      - key: APP_DEMO_ENABLED
        value: "true"
      - key: APP_DEMO_PASSWORD
        value: "admin123"
      - key: APP_CORS_ALLOWED_ORIGINS
        value: "https://farmer.indevs.in"

  - type: static_site
    name: farm-sales-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        sync: false
