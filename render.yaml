services:
  - type: web
    name: farm-sales-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /actuator/health/readiness
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      # Legacy Render databases may still store historical Flyway checksums
      # from older migration revisions. Repair once before migrate so deploys
      # can recover without disabling validation globally.
      - key: APP_FLYWAY_REPAIR_BEFORE_MIGRATE
        value: "true"
      # Keep demo/reset off by default. Full demo catalog on Render requires
      # supplying frontend/public/images/products to the backend container.
      - key: APP_DEMO_ENABLED
        value: "false"
      - key: APP_DEMO_SEED_ON_STARTUP
        value: "false"
      - key: APP_CORS_ALLOWED_ORIGINS
        value: "https://farmer.indevs.in,https://farm-sales-frontend.onrender.com,https://*.onrender.com"

  - type: web
    name: farm-sales-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        value: "https://farm-sales-backend.onrender.com/api"
