server:
  port: ${PORT:8080}
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,text/plain,text/html,text/css,application/javascript

spring:
  profiles:
    default: dev
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/farm_sales}
    username: ${SPRING_DATASOURCE_USERNAME:sales}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 64
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:?JWT_SECRET must be set and be at least 32 bytes}
    issuer: farm-sales
    expiration-minutes: 60
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:5174,http://localhost:5174,http://127.0.0.1:4173,http://localhost:4173,https://*.onrender.com,https://*.pages.dev}
  demo:
    enabled: ${APP_DEMO_ENABLED:false}
    seed-on-startup: ${APP_DEMO_SEED_ON_STARTUP:true}
    transport-seed-on-startup: ${APP_DEMO_SEED_ON_STARTUP:true}
  geo:
    nominatim-base-url: ${APP_GEO_NOMINATIM_BASE_URL:https://nominatim.openstreetmap.org}
    user-agent: ${APP_GEO_USER_AGENT:FarmSalesCourseProject/1.0}
    connect-timeout-ms: ${APP_GEO_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${APP_GEO_READ_TIMEOUT_MS:5000}
  routing:
    osrm-base-url: ${APP_ROUTING_OSRM_BASE_URL:https://router.project-osrm.org}
    user-agent: ${APP_ROUTING_USER_AGENT:FarmSalesCourseProject/1.0}
    connect-timeout-ms: ${APP_ROUTING_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${APP_ROUTING_READ_TIMEOUT_MS:20000}
    cache-ttl-ms: ${APP_ROUTING_CACHE_TTL_MS:900000}
    cache-max-entries: ${APP_ROUTING_CACHE_MAX_ENTRIES:10000}
    max-table-coordinates: ${APP_ROUTING_MAX_TABLE_COORDINATES:50}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState,ping

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
